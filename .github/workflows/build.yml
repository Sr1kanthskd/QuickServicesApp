name: Diagnostics Build

on:
  push:
    branches: [ "main" ]

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: List All Files in Repository
      run: |
        echo "=== Current Root Directory Contents ==="
        ls -la
        echo "=== Searching for any zip files ==="
        find . -name "*.zip" -o -name "*.ZIP"
        
