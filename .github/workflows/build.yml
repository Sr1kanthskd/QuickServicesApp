name: Build Android App From Zip

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip and Find Project
      run: |
        unzip -q *.zip -d temp_project
        # Automatically find the hidden folder containing gradlew and move it
        GRADLE_DIR=$(find temp_project -name "gradlew" -exec dirname {} \;)
        if [ -n "$GRADLE_DIR" ]; then
          cp -a "$GRADLE_DIR/"* .
        else
          echo "Error: gradlew not found in the zip file!"
          exit 1
        fi
        rm -rf temp_project *.zip

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK and AAB
      run: |
        ./gradlew assembleRelease
        ./gradlew bundleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-AAB
        path: app/build/outputs/bundle/release/app-release.aab
        
