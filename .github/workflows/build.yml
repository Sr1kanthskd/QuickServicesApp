name: Build Android App From Zip

on:
  push:
    branches: [ "main" ]

env:
  JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
  GRADLE_OPTS: "-Djava.awt.headless=true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip and Flatten Project
      shell: python
      run: |
        import zipfile
        import os
        import shutil

        zip_files = [f for f in os.listdir('.') if f.endswith('.zip')]
        if not zip_files:
            print("Error: No zip file found!")
            exit(1)
        
        zip_name = zip_files[0]
        temp_dir = "temp_extract"
        with zipfile.ZipFile(zip_name, 'r') as zip_ref:
            zip_ref.extractall(temp_dir)

        target_source = temp_dir
        for root, dirs, files in os.walk(temp_dir):
            if 'build.gradle' in files or 'build.gradle.kts' in files:
                target_source = root
                break

        for item in os.listdir(target_source):
            s = os.path.join(target_source, item)
            d = os.path.join('.', item)
            if os.path.isdir(s):
                if os.path.exists(d): shutil.rmtree(d)
                shutil.copytree(s, d)
            else:
                shutil.copy(s, d)

        shutil.rmtree(temp_dir)
        os.remove(zip_name)

    - name: Apply Custom App Icon Safely
      run: |
        ICON_PATH=$(find . -name "icon.png" | head -n 1)
        if [ -n "$ICON_PATH" ]; then
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "app/src/main/res/mipmap-$density"
            cp "$ICON_PATH" "app/src/main/res/mipmap-$density/ic_launcher.png"
            cp "$ICON_PATH" "app/src/main/res/mipmap-$density/ic_launcher_round.png"
          done
        fi

    - name: The AI Resource Healer (Fix Missing XMLs)
      shell: python
      run: |
        import os
        import re

        values_dir = 'app/src/main/res/values'
        os.makedirs(values_dir, exist_ok=True)

        existing_names = set()
        name_pattern = re.compile(r'name="([^"]+)"')

        for file in os.listdir(values_dir):
            if file.endswith('.xml'):
                with open(os.path.join(values_dir, file), 'r', encoding='utf-8') as f:
                    existing_names.update(name_pattern.findall(f.read()))

        found_strings = set()
        found_colors = set()
        found_styles = set()

        str_pattern = re.compile(r'@string/([a-zA-Z0-9_]+)')
        color_pattern = re.compile(r'@color/([a-zA-Z0-9_]+)')
        style_pattern = re.compile(r'@style/([a-zA-Z0-9_.]+)')

        for root, dirs, files in os.walk('app/src/main'):
            for file in files:
                if file.endswith('.xml') or file.endswith('.kt'):
                    with open(os.path.join(root, file), 'r', encoding='utf-8') as f:
                        content = f.read()
                        found_strings.update(str_pattern.findall(content))
                        found_colors.update(color_pattern.findall(content))
                        found_styles.update(style_pattern.findall(content))

        fallback = '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n'
        
        for s in (found_strings - existing_names):
            if s == 'app_name':
                fallback += f'    <string name="app_name">QuickServicesApp</string>\n'
            else:
                fallback += f'    <string name="{s}">Text</string>\n'
                
        for c in (found_colors - existing_names):
            if c == 'transparent':
                fallback += f'    <color name="{c}">#00000000</color>\n'
            else:
                fallback += f'    <color name="{c}">#FF000000</color>\n'
                
        for st in (found_styles - existing_names):
            fallback += f'    <style name="{st}" parent="Theme.AppCompat.Light.NoActionBar"></style>\n'

        fallback += '</resources>'

        with open(os.path.join(values_dir, 'ai_fallback_generated.xml'), 'w', encoding='utf-8') as f:
            f.write(fallback)

    - name: Strip Missing Key Requirements For Unsigned Release
      shell: python
      run: |
        import os
        for root, dirs, files in os.walk('.'):
            for file in files:
                if file in ['build.gradle', 'build.gradle.kts'] and 'app' in root:
                    target_path = os.path.join(root, file)
                    print(f"Modifying {target_path} to remove strict signing locks...")
                    with open(target_path, 'r', encoding='utf-8') as f:
                        lines = f.readlines()
                    with open(target_path, 'w', encoding='utf-8') as f:
                        for line in lines:
                            # Strict full-word matching prevents breaking the 'signingConfigs {' structural blocks
                            if 'signingConfig =' in line or 'storeFile =' in line or 'signingConfig.set' in line:
                                f.write(f"// {line}")
                            else:
                                f.write(line)

    - name: Setup Gradle Official Automation
      uses: gradle/actions/setup-gradle@v4

    - name: Configure Headless Build & Generate Wrapper
      run: |
        echo "org.gradle.jvmargs=-Xmx3200m -Djava.awt.headless=true" >> gradle.properties
        echo "kotlin.daemon.jvmargs=-Xmx2048m -Djava.awt.headless=true" >> gradle.properties
        echo "kotlin.compiler.execution.strategy=in-process" >> gradle.properties
        
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew

    - name: Build Official Release APK and AAB
      run: |
        ./gradlew assembleRelease --stacktrace --no-daemon
        ./gradlew bundleRelease --stacktrace --no-daemon

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-Release-APK
        path: "**/build/outputs/apk/release/*.apk"

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-Release-AAB
        path: "**/build/outputs/bundle/release/*.aab"
