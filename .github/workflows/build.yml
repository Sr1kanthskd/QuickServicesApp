name: Build Android App From Zip

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip and Flatten Project
      shell: python
      run: |
        import zipfile
        import os
        import shutil

        zip_files = [f for f in os.listdir('.') if f.endswith('.zip')]
        if not zip_files:
            print("Error: No zip file found!")
            exit(1)
        
        zip_name = zip_files[0]
        temp_dir = "temp_extract"
        with zipfile.ZipFile(zip_name, 'r') as zip_ref:
            zip_ref.extractall(temp_dir)

        target_source = temp_dir
        for root, dirs, files in os.walk(temp_dir):
            if 'build.gradle' in files or 'build.gradle.kts' in files:
                target_source = root
                break

        print(f"Moving files from {target_source} to root...")
        for item in os.listdir(target_source):
            s = os.path.join(target_source, item)
            d = os.path.join('.', item)
            if os.path.isdir(s):
                if os.path.exists(d): shutil.rmtree(d)
                shutil.copytree(s, d)
            else:
                shutil.copy(s, d)

        shutil.rmtree(temp_dir)
        os.remove(zip_name)
        print("Extraction complete!")

    - name: Apply Custom App Icon
      run: |
        echo "=== Searching for your icon.png ==="
        ICON_PATH=$(find . -name "icon.png" | head -n 1)

        if [ -n "$ICON_PATH" ]; then
          echo "Found your custom icon at $ICON_PATH!"
          find app/src/main/res -name "ic_launcher*.png" -delete
          find app/src/main/res -name "ic_launcher*.xml" -delete
          find app/src/main/res -type d -name "mipmap-*" | while read dir; do
            cp "$ICON_PATH" "$dir/ic_launcher.png"
            cp "$ICON_PATH" "$dir/ic_launcher_round.png"
          done
          echo "Custom icon applied successfully!"
        else
          echo "Error: icon.png not found!"
        fi

    - name: Generate Missing Gradle Wrapper & Server Properties
      run: |
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found. Generating a new one..."
          gradle wrapper
        fi
        chmod +x gradlew

        # FORCE THE CLOUD SERVER TO RUN IN STRICT HEADLESS MODE
        echo "org.gradle.jvmargs=-Xmx3200m -Dfile.encoding=UTF-8 -Djava.awt.headless=true" >> gradle.properties
        echo "kotlin.daemon.jvm.options=-Xmx2048m -Djava.awt.headless=true" >> gradle.properties

    - name: Build APK and AAB
      run: |
        # Pass the headless flag directly to the execution command as a fail-safe
        ./gradlew assembleRelease --stacktrace --no-daemon -Djava.awt.headless=true
        ./gradlew bundleRelease --stacktrace --no-daemon -Djava.awt.headless=true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-APK
        path: "**/build/outputs/apk/release/*-unsigned.apk"

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-AAB
        path: "**/build/outputs/bundle/release/*.aab"
        
