name: Build Android App From Zip

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Clone Clean Android Template
      run: |
        # Download a verified native Android boilerplate template setup
        git clone https://github.com/android/architecture-templates.git temp_template
        # Move the inner starter configuration out to root
        cp -r temp_template/v2-starter/* . || cp -r temp_template/* . || true
        rm -rf temp_template

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Inject AI Code Files
      shell: python
      run: |
        import zipfile
        import os
        import shutil

        zip_files = [f for f in os.listdir('.') if f.endswith('.zip')]
        if not zip_files:
            print("Zip file not detected in root.")
            exit(0)
        
        zip_name = zip_files[0]
        temp_extract_dir = "extracted_content"
        
        with zipfile.ZipFile(zip_name, 'r') as zip_ref:
            zip_ref.extractall(temp_extract_dir)

        # Map and override layout/source paths inside the template folder structure
        for root, dirs, files in os.walk(temp_extract_dir):
            for file in files:
                full_path = os.path.join(root, file)
                
                if file.endswith('.xml') and 'layout' in root:
                    os.makedirs('app/src/main/res/layout', exist_ok=True)
                    shutil.copy(full_path, os.path.join('app', 'src', 'main', 'res', 'layout', file))
                elif file.endswith('.kt'):
                    os.makedirs('app/src/main/java/com/quickservices/app', exist_ok=True)
                    shutil.copy(full_path, os.path.join('app', 'src', 'main', 'java', 'com', 'quickservices', 'app', file))
                elif file == 'AndroidManifest.xml':
                    os.makedirs('app/src/main', exist_ok=True)
                    shutil.copy(full_path, os.path.join('app', 'src', 'main', 'AndroidManifest.xml'))
                elif file.endswith('.xml') and 'values' in root:
                    os.makedirs('app/src/main/res/values', exist_ok=True)
                    shutil.copy(full_path, os.path.join('app', 'src', 'main', 'res', 'values', file))

        shutil.rmtree(temp_extract_dir)
        os.remove(zip_name)
        print("Code successfully injected into architecture boilerplate!")

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK and AAB
      run: |
        ./gradlew assembleRelease --stacktrace
        ./gradlew bundleRelease --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-APK
        path: "**/build/outputs/apk/release/*-unsigned.apk"

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-AAB
        path: "**/build/outputs/bundle/release/*.aab"
        
