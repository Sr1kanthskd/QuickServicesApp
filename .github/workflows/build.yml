name: Build Android App From Zip

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip and Flatten Project File
      shell: python
      run: |
        import zipfile
        import os
        import shutil

        # Find any zip file in the root directory
        zip_files = [f for f in os.listdir('.') if f.endswith('.zip')]
        if not zip_files:
            print("Error: No .zip file found in the repository root!")
            exit(1)
        
        zip_name = zip_files[0]
        print(f"Found zip file: {zip_name}")

        # Extract everything to a temporary folder
        temp_extract_dir = "extracted_content"
        with zipfile.ZipFile(zip_name, 'r') as zip_ref:
            zip_ref.extractall(temp_extract_dir)

        # Determine if the zip contents are wrapped in a single outer folder
        contents = os.listdir(temp_extract_dir)
        if len(contents) == 1 and os.path.isdir(os.path.join(temp_extract_dir, contents[0])):
            source_folder = os.path.join(temp_extract_dir, contents[0])
            print(f"Detected nested outer folder: {contents[0]}")
        else:
            source_folder = temp_extract_dir
            print("Zip file is flat (no nested outer folder).")

        # Move all files and folders to the repository root
        for item in os.listdir(source_folder):
            source_path = os.path.join(source_folder, item)
            destination_path = os.path.join('.', item)
            
            if os.path.isdir(source_path):
                if os.path.exists(destination_path):
                    shutil.rmtree(destination_path)
                shutil.copytree(source_path, destination_path)
            else:
                shutil.copy(source_path, destination_path)

        # Clean up the temporary extraction folder and the original zip file
        shutil.rmtree(temp_extract_dir)
        os.remove(zip_name)
        print("Extraction and flattening successful!")

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK and AAB
      run: |
        ./gradlew assembleRelease
        ./gradlew bundleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: QuickServices-AAB
        path: app/build/outputs/bundle/release/app-release.aab
        
